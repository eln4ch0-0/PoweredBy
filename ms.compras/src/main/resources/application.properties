spring.application.name=ms.compras
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ms_compras_db?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URLs de microservicios consumidos
servicios.usuarios.url=http://localhost:8081/api/usuarios
servicios.catalogo.url=http://localhost:8082/api/juegos

# Timeouts
servicios.timeout.segundos=5

#Log
logging.level.cl.duoc.tienda.ms.compras=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] - %msg%n

#Swagger/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html