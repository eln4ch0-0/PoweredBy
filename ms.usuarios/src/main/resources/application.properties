# Identificación del microservicio
spring.application.name=ms.usuarios
server.port=8081

# Datasource MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ms_usuarios_db?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs
logging.level.cl.duoc.tienda.ms.usuarios=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] - %msg%n