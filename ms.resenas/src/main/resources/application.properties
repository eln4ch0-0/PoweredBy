spring.application.name=ms.resenas
server.port=8084

#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ms_resenas_db?createDatabaseIfNotExist=true&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#URLs de microservicios consumidos
servicios.compras.biblioteca.url=http://localhost:8083/api/biblioteca

#Timeouts
servicios.timeout.segundos=5

#Log
logging.level.cl.duoc.tienda.ms.resenas=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{0}] - %msg%n

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

#Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true